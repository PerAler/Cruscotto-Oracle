<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Totali - Cruscotto Procedure Oracle</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="stylesheet" th:href="@{/dashboard.css}">
</head>
<body>
<nav class="eng-topbar">
    <div class="eng-topbar-left">
        <img src="/engage-logo.jpg" alt="engage">
        <div class="eng-topbar-divider"></div>
        <span class="eng-topbar-app">Cruscotto Oracle</span>
    </div>
    <div class="eng-topbar-center">
        <p class="hero-runtime" th:classappend="' state-' + ${robotState}">
            Istanza PID <strong th:text="${runtimePid}"></strong>
            avviata alle
            <strong th:text="${#temporals.format(runtimeStartedAt, 'dd/MM/yyyy HH:mm:ss')}"></strong>
            · v<strong th:text="${appVersion}"></strong>
        </p>
    </div>
    <div class="eng-topbar-right">
        <svg width="44" height="44" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
             style="flex-shrink:0"
             class="robot-icon"
             th:classappend="' state-' + ${robotState}">
            <circle cx="100" cy="100" r="84" fill="rgba(255,255,255,0.08)"/>
            <circle cx="100" cy="100" r="88" class="status-ring"/>
            <line x1="100" y1="24" x2="100" y2="46" class="robot-antenna"/>
            <circle cx="100" cy="18" r="8" class="robot-antenna-tip"/>
            <rect x="56" y="46" width="88" height="56" rx="18" class="robot-head"/>
            <rect x="74" y="60" width="52" height="24" rx="10" class="robot-face"/>
            <circle cx="90" cy="72" r="6" class="robot-eye"/>
            <circle cx="110" cy="72" r="6" class="robot-eye"/>
            <rect x="94" y="84" width="12" height="4" rx="2" class="robot-accent"/>
            <rect x="64" y="108" width="72" height="52" rx="16" class="robot-body"/>
            <rect x="82" y="120" width="36" height="24" rx="6" class="robot-display"/>
            <text x="88" y="136" class="calc-glyph">+</text>
            <text x="100" y="136" class="calc-glyph delay-1">1</text>
            <text x="110" y="136" class="calc-glyph delay-2">=</text>
            <line x1="64" y1="118" x2="40" y2="136" class="robot-limb"/>
            <line x1="136" y1="118" x2="160" y2="136" class="robot-limb robot-arm-right"/>
            <line x1="84" y1="160" x2="74" y2="182" class="robot-limb"/>
            <line x1="116" y1="160" x2="126" y2="182" class="robot-limb"/>
            <rect x="144" y="128" width="26" height="32" rx="5" class="robot-panel"/>
            <circle cx="152" cy="136" r="2.2" class="robot-accent"/>
            <circle cx="162" cy="136" r="2.2" class="robot-accent"/>
            <rect x="149" y="144" width="14" height="3" rx="1.5" class="robot-accent"/>
            <path d="M38 74 Q28 86 36 98" class="spark"/>
            <path d="M160 60 Q176 76 164 92" class="spark" style="animation-delay:0.45s"/>
        </svg>
        <div class="eng-topbar-brand-copy">
            <span class="hero-title" th:classappend="' state-' + ${robotState}">Cruscotto Oracle</span>
            <span class="robot-status-label"
                  th:classappend="' state-' + ${robotState}"
                  th:text="${robotState == 'db-offline' ? 'Robot offline: DB KO' : (robotState == 'script-error' ? 'Robot in allarme: script KO' : 'Robot operativo: DB OK')}">
                Robot operativo: DB OK
            </span>
        </div>
        <span class="eng-topbar-page">Pagina: Log</span>
    </div>
</nav>
<div class="bg-shape shape-a"></div>
<div class="bg-shape shape-b"></div>

<header class="hero">
    <!--<h1 style="margin:0">Log Totali</h1>-->
    <p>Vista completa dei log di esecuzione in finestra dedicata.</p>
</header>

<main class="layout">
    <section class="card">
        <button type="button" class="btn-back" onclick="window.location.reload()">↻ Refresh pagina</button>
    </section>

    <section class="card">
        <h2>Log Esecuzioni</h2>
        <div class="log-toolbar" th:if="${!allLogs.isEmpty()}">
            <input type="text" id="logFilterText" placeholder="Filtra per procedura o messaggio...">
            <select id="logFilterStatus">
                <option value="" th:selected="${logStatusFilter == null or logStatusFilter == ''}">Tutti gli stati</option>
                <option value="OK" th:selected="${logStatusFilter == 'OK'}">Solo OK</option>
                <option value="KO" th:selected="${logStatusFilter == 'KO'}">Solo KO</option>
                <option value="HAS_OUTPUT" th:selected="${logStatusFilter == 'HAS_OUTPUT'}">Solo con output</option>
            </select>
            <p id="logFilterCounter" class="log-counter"></p>
        </div>

        <table>
            <thead>
            <tr>
                <th>Timestamp</th>
                <th>Procedura</th>
                <th>Esito</th>
                <th>Durata</th>
                <th>Messaggio</th>
                <th>Parametri</th>
                <th>Output</th>
                <th>DBMS Output</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log, logStat : ${allLogs}"
                class="log-row"
                th:attr="data-procedure=${log.procedureName()},data-status=${log.status()},data-message=${log.message()},data-has-output=${log.outputHtmlFile() != null}">
                <td th:text="${log.timestamp()}"></td>
                <td th:text="${log.procedureName()}"></td>
                <td th:text="${log.status()}" th:classappend="${log.status() == 'OK'} ? 'badge-ok' : 'badge-ko'"></td>
                <td th:text="${log.durationMs() + ' ms'}"></td>
                <td th:text="${log.message()}"></td>
                <td th:text="${log.parameters()}"></td>
                <td>
                    <div th:if="${log.outputHtmlFile() != null}" class="output-links"
                         th:with="csvFile=${#strings.endsWith(log.outputHtmlFile(), '.csv') ? log.outputHtmlFile() : #strings.replace(log.outputHtmlFile(), '.html', '.csv')},htmlFile=${#strings.endsWith(log.outputHtmlFile(), '.html') ? log.outputHtmlFile() : #strings.replace(log.outputHtmlFile(), '.csv', '.html')},xlsxFile=${#strings.endsWith(log.outputHtmlFile(), '.xlsx') ? log.outputHtmlFile() : (#strings.endsWith(log.outputHtmlFile(), '.csv') ? #strings.replace(log.outputHtmlFile(), '.csv', '.xlsx') : #strings.replace(log.outputHtmlFile(), '.html', '.xlsx'))}">
                        <a th:href="@{'/output/' + ${htmlFile}}" target="_blank" class="output-link">HTML</a>
                        <a th:href="@{'/output/download/' + ${csvFile}}" class="output-link secondary-link">CSV</a>
                        <a href="#" 
                           th:data-xlsx-file="@{'/output/download/' + ${xlsxFile}}"
                           th:data-xlsx-view="@{'/output/download/' + ${xlsxFile}}"
                           class="output-link secondary-link xlsx-link">XLSX</a>
                    </div>
                    <span th:if="${log.outputHtmlFile() == null}" class="no-output">—</span>
                </td>
                <td>
                    <div th:if="${log.dbmsOutput() != null and log.dbmsOutput() != ''}" class="dbms-output-cell">
                        <button type="button" class="btn-dbms-output" th:attr="data-log-index=${logStat.index}">📄 Mostra</button>
                        <div th:id="'dbms-output-' + ${logStat.index}" class="dbms-output-modal" style="display: none;">
                            <div class="dbms-output-content">
                                <textarea readonly class="dbms-output-text" th:text="${log.dbmsOutput()}"></textarea>
                                <button type="button" class="btn-close-dbms" onclick="this.closest('.dbms-output-modal').style.display='none';">Chiudi</button>
                            </div>
                        </div>
                    </div>
                    <span th:if="${log.dbmsOutput() == null or log.dbmsOutput() == ''}" class="no-output">—</span>
                </td>
            </tr>
            <tr th:if="${allLogs.isEmpty()}">
                <td colspan="8">Nessun log disponibile.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<script>
    (function () {
        var logFilterText = document.getElementById("logFilterText");
        var logFilterStatus = document.getElementById("logFilterStatus");
        var logFilterCounter = document.getElementById("logFilterCounter");

        function applyLogFilters() {
            var rows = Array.from(document.querySelectorAll(".log-row"));
            if (!rows.length) {
                if (logFilterCounter) {
                    logFilterCounter.textContent = "0 log visibili";
                }
                return;
            }

            var textQuery = logFilterText ? logFilterText.value.toLowerCase().trim() : "";
            var statusQuery = logFilterStatus ? logFilterStatus.value : "";
            var visibleCount = 0;

            rows.forEach(function (row) {
                var procedure = (row.dataset.procedure || "").toLowerCase();
                var message = (row.dataset.message || "").toLowerCase();
                var status = row.dataset.status || "";
                var hasOutput = row.dataset.hasOutput === "true";

                var matchesText = !textQuery || procedure.includes(textQuery) || message.includes(textQuery);
                var matchesStatus = !statusQuery
                    || (statusQuery === "HAS_OUTPUT" && hasOutput)
                    || status === statusQuery;
                var visible = matchesText && matchesStatus;

                row.hidden = !visible;
                if (visible) {
                    visibleCount++;
                }
            });

            if (logFilterCounter) {
                logFilterCounter.textContent = visibleCount + " log visibili";
            }
        }

        if (logFilterText) {
            logFilterText.addEventListener("input", applyLogFilters);
        }
        if (logFilterStatus) {
            logFilterStatus.addEventListener("change", applyLogFilters);
        }
        applyLogFilters();
    })();

    // Dialog per scelta apertura/download XLSX
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.xlsx-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                var downloadUrl = this.getAttribute('data-xlsx-file');
                var viewUrl = this.getAttribute('data-xlsx-view');
                
                var choices = confirm('Scegli come visualizzare il file XLSX:\n\nOK = Apri nel browser\nAnnulla = Scarica il file');
                if (choices) {
                    window.open(viewUrl, '_blank');
                } else {
                    window.location.href = downloadUrl;
                }
            });
        });

        // Gestione DBMS Output modals
        document.querySelectorAll('.btn-dbms-output').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                var logIndex = this.getAttribute('data-log-index');
                var modal = document.getElementById('dbms-output-' + logIndex);
                if (modal) {
                    modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
                }
            });
        });

        // Chiudi modal quando si clicca fuori
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('dbms-output-modal')) {
                e.target.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
