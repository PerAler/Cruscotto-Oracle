<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errori - Cruscotto Procedure Oracle</title>
    <link rel="stylesheet" th:href="@{/dashboard.css}">
</head>
<body>
<div class="bg-shape shape-a"></div>
<div class="bg-shape shape-b"></div>

<header class="hero">
    <h1>Errori di Esecuzione</h1>
    <p>Log dettagliato degli errori durante l'esecuzione delle procedure</p>
    <p>
        Istanza PID <strong th:text="${runtimePid}"></strong>
        avviata alle
        <strong th:text="${#temporals.format(runtimeStartedAt, 'dd/MM/yyyy HH:mm:ss')}"></strong>
    </p>
</header>

<main class="layout">
    <section class="card">
        <a href="/" class="btn-back">← Torna al Dashboard</a>
    </section>

    <section class="card" th:if="${allErrors.isEmpty()}">
        <p class="ok">✓ Nessun errore registrato</p>
    </section>

    <section class="card errors-full" th:unless="${allErrors.isEmpty()}">
        <h2>Errori Registrati (<span th:text="${allErrors.size()}"></span>)</h2>
        <div class="error-list-full">
            <article class="error-item-full" th:each="error : ${allErrors}">
                <div class="error-header-full">
                    <span class="error-procedure-badge" th:text="${error.procedureName()}"></span>
                    <span class="error-status">KO</span>
                    <span class="error-time" th:text="${#temporals.format(error.timestamp(), 'dd/MM/yyyy HH:mm:ss')}"></span>
                    <span class="error-duration" th:text="${error.durationMs() + 'ms'}"></span>
                </div>
                <div class="error-message-full" th:text="${error.message()}"></div>
                <details class="error-params-full" th:if="${error.parameters() != null and !error.parameters().isEmpty()}">
                    <summary>📋 Parametri dell'esecuzione</summary>
                    <pre th:text="${error.parameters()}"></pre>
                </details>
                <details class="error-stacktrace-full" th:if="${error.stackTrace() != null}">
                    <summary>🔍 Stack Trace completo</summary>
                    <pre th:text="${error.stackTrace()}"></pre>
                </details>
            </article>
        </div>
    </section>
</main>

<script>
    // Gestione filtri e ricerca, eventualmente
    document.addEventListener('DOMContentLoaded', function() {
        // Inizializzazione futura se necessaria
    });
</script>
</body>
</html>
