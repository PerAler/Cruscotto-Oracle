<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor SQL — Cruscotto Oracle</title>
    <link rel="stylesheet" th:href="@{/dashboard.css}">
    <style>
        /* ── Layout pagina editor ────────────────────────────────────────── */
        .editor-layout {
            width: min(1280px, 97vw);
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .editor-topbar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .editor-topbar select {
            flex: 1 1 200px;
            max-width: 420px;
        }

        /* ── Editor SQL con numeri di riga ───────────────────────────────── */
        .sql-editor-wrap {
            display: flex;
            position: relative;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #1d1f21;
            font-family: 'Consolas', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.55;
            min-height: 280px;
            max-height: 520px;
            resize: vertical;
        }

        .line-numbers {
            background: #252729;
            color: #636c72;
            padding: 0.75rem 0.4rem 0.75rem 0.6rem;
            text-align: right;
            user-select: none;
            white-space: pre;
            overflow: hidden;
            border-right: 1px solid #363a3d;
            min-width: 2.8rem;
            font-size: inherit;
            line-height: inherit;
            flex-shrink: 0;
        }

        #sqlEditor {
            flex: 1;
            background: #1d1f21;
            color: #c5c8c6;
            border: none;
            outline: none;
            padding: 0.75rem 0.75rem;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            resize: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            overflow-y: auto;
            tab-size: 4;
            caret-color: #f0c040;
        }

        #sqlEditor::selection {
            background: #4a5568;
        }

        .sql-suggest-box {
            position: absolute;
            left: 3.25rem;
            right: 0.75rem;
            bottom: 0.65rem;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #3a4045;
            border-radius: 6px;
            background: #202427;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
            z-index: 15;
        }

        .sql-suggest-box ul {
            margin: 0;
            padding: 0.2rem 0;
            list-style: none;
        }

        .sql-suggest-item {
            padding: 0.3rem 0.55rem;
            color: #d8dee9;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .sql-suggest-item strong {
            color: #f0c040;
            font-weight: 700;
        }

        .sql-suggest-item.active,
        .sql-suggest-item:hover {
            background: #2f3a42;
        }

        /* ── Params editor ───────────────────────────────────────────────── */
        .params-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.8rem;
        }

        @media (max-width: 720px) {
            .params-row { grid-template-columns: 1fr; }
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #556;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .field-group input,
        .field-group textarea,
        .field-group select {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0.45rem 0.6rem;
            font-family: inherit;
            font-size: 0.875rem;
            background: var(--panel);
            color: var(--ink);
        }

        .field-group textarea {
            font-family: 'Consolas', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.8rem;
            resize: vertical;
            min-height: 80px;
        }

        /* ── Action bar ──────────────────────────────────────────────────── */
        .action-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-bar .spacer { flex: 1; }

        .btn {
            border: none;
            border-radius: 7px;
            padding: 0.45rem 1.1rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: filter 0.15s, transform 0.1s;
            white-space: nowrap;
        }

        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.45; cursor: default; filter: none; transform: none; }

        .btn-run  { background: var(--accent); color: #fff; }
        .btn-save { background: var(--ok); color: #fff; }
        .btn-upd  { background: var(--warm); color: #fff; }
        .btn-sec  { background: #e8e2d8; color: var(--ink); }

        /* ── Messaggi ────────────────────────────────────────────────────── */
        .msg-bar {
            padding: 0.5rem 0.8rem;
            border-radius: 7px;
            font-size: 0.9rem;
            display: none;
        }
        .msg-bar.ok  { background: #d4edda; color: #155724; display: block; }
        .msg-bar.ko  { background: #f8d7da; color: #721c24; display: block; }

        /* ── Pannello risultati ──────────────────────────────────────────── */
        #resultPanel {
            display: none;
            border: 1px solid #c9dce2;
            background: linear-gradient(180deg, #fffdf8 0%, #f6fbff 100%);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.7rem;
            padding: 0.15rem 0.1rem 0.45rem;
            border-bottom: 1px dashed #c7d8de;
        }

        .result-header h3 { margin: 0; font-size: 1rem; }

        #resultFrame {
            width: 100%;
            min-height: 380px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
            box-shadow: inset 0 0 0 1px rgba(5, 102, 141, 0.05);
        }

        /* ── Header ──────────────────────────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-header h2 { margin: 0; }

        .nav-back {
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-back:hover { text-decoration: underline; }

        /* ── Badge script selezionato ────────────────────────────────────── */
        .script-badge {
            display: inline-block;
            background: #e0f0f9;
            color: var(--accent);
            border-radius: 5px;
            padding: 0.1rem 0.55rem;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.4rem;
        }

        /* ── Spinner inline ──────────────────────────────────────────────── */
        .spin-inline {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.3rem;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Robot animato ───────────────────────────────────────────────── */
        @keyframes bot-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        @keyframes arm-tap { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(8deg); } }
        @keyframes blink { 0%, 44%, 100% { transform: scaleY(1); } 47%, 49% { transform: scaleY(0.12); } }
        @keyframes calc-shift { 0% { opacity: 0; transform: translateY(8px); } 20%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-8px); } }
        @keyframes alert-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes spark-anim { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.85; } }
        @keyframes title-sheen {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        @keyframes hero-enter-soft {
            0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); }
        }

        .robot-icon {
            --robot-main: #4df6ff;
            --robot-dark: #0891a6;
            --robot-accent: #f59e0b;
            --robot-alert: #ef4444;
            --robot-offline: #64748b;
            --robot-eye: #0f172a;
            animation: hero-enter-soft 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both,
                       bot-float 2.8s ease-in-out 0.8s infinite;
            overflow: visible;
        }
        .robot-icon.state-ok    { --robot-main: #67e8f9; --robot-dark: #0891b2; }
        .robot-icon.state-script-error { --robot-main: #fda4af; --robot-dark: #e11d48; --robot-accent: #fb7185; }
        .robot-icon.state-db-offline   { --robot-main: #cbd5e1; --robot-dark: #475569; --robot-accent: #94a3b8; }
        .robot-head, .robot-body, .robot-limb, .robot-antenna, .robot-panel {
            fill: var(--robot-main); stroke: var(--robot-dark); stroke-width: 4;
        }
        .robot-panel, .robot-antenna-tip, .robot-accent { fill: var(--robot-accent); }
        .robot-face, .robot-display { fill: #ecfeff; stroke: var(--robot-dark); stroke-width: 3; }
        .robot-eye {
            fill: var(--robot-eye);
            transform-box: fill-box; transform-origin: center;
            animation: blink 4s ease-in-out infinite;
        }
        .robot-arm-right {
            transform-box: fill-box; transform-origin: 20% 20%;
            animation: arm-tap 1.2s ease-in-out infinite;
        }
        .calc-glyph { fill: var(--robot-dark); font-size: 18px; font-weight: 700; animation: calc-shift 2s ease-in-out infinite; }
        .calc-glyph.delay-1 { animation-delay: 0.35s; }
        .calc-glyph.delay-2 { animation-delay: 0.7s; }
        .spark, .status-ring {
            stroke: var(--robot-accent); stroke-width: 3; fill: none;
            animation: spark-anim 1.8s ease-in-out infinite;
        }
        .status-ring { animation: alert-pulse 1.4s ease-in-out infinite; }
        .robot-icon.state-script-error .status-ring,
        .robot-icon.state-script-error .spark { stroke: var(--robot-alert); }
        .robot-icon.state-db-offline .status-ring,
        .robot-icon.state-db-offline .spark { stroke: var(--robot-offline); }
        .robot-icon.state-db-offline .calc-glyph,
        .robot-icon.state-db-offline .robot-eye { opacity: 0.55; }
        .robot-status-label {
            display: inline-flex; align-items: center;
            margin-top: 0.35rem; padding: 0.2rem 0.55rem;
            border-radius: 999px; font-size: 0.78rem; font-weight: 700;
            background: rgba(255,255,255,0.14); color: #e6fffb;
        }
        .robot-status-label.state-script-error { background: rgba(225,29,72,0.18); color: #ffe4e6; }
        .robot-status-label.state-db-offline   { background: rgba(71,85,105,0.22); color: #e2e8f0; }
    </style>
</head>
<body>
<div class="bg-shape shape-a"></div>
<div class="bg-shape shape-b"></div>

<header class="hero">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.5rem">
        <svg width="64" height="64" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
             style="flex-shrink:0"
             class="robot-icon"
             th:classappend="' state-' + ${robotState}">
            <circle cx="100" cy="100" r="84" fill="rgba(255,255,255,0.08)"/>
            <circle cx="100" cy="100" r="88" class="status-ring"/>
            <line x1="100" y1="24" x2="100" y2="46" class="robot-antenna"/>
            <circle cx="100" cy="18" r="8" class="robot-antenna-tip"/>
            <rect x="56" y="46" width="88" height="56" rx="18" class="robot-head"/>
            <rect x="74" y="60" width="52" height="24" rx="10" class="robot-face"/>
            <circle cx="90" cy="72" r="6" class="robot-eye"/>
            <circle cx="110" cy="72" r="6" class="robot-eye"/>
            <rect x="94" y="84" width="12" height="4" rx="2" class="robot-accent"/>
            <rect x="64" y="108" width="72" height="52" rx="16" class="robot-body"/>
            <rect x="82" y="120" width="36" height="24" rx="6" class="robot-display"/>
            <text x="88" y="136" class="calc-glyph">+</text>
            <text x="100" y="136" class="calc-glyph delay-1">1</text>
            <text x="110" y="136" class="calc-glyph delay-2">=</text>
            <line x1="64" y1="118" x2="40" y2="136" class="robot-limb"/>
            <line x1="136" y1="118" x2="160" y2="136" class="robot-limb robot-arm-right"/>
            <line x1="84" y1="160" x2="74" y2="182" class="robot-limb"/>
            <line x1="116" y1="160" x2="126" y2="182" class="robot-limb"/>
            <rect x="144" y="128" width="26" height="32" rx="5" class="robot-panel"/>
            <circle cx="152" cy="136" r="2.2" class="robot-accent"/>
            <circle cx="162" cy="136" r="2.2" class="robot-accent"/>
            <rect x="149" y="144" width="14" height="3" rx="1.5" class="robot-accent"/>
            <path d="M38 74 Q28 86 36 98" class="spark"/>
            <path d="M160 60 Q176 76 164 92" class="spark" style="animation-delay:0.45s"/>
        </svg>
        <div style="animation: hero-enter-soft 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both">
            <h1 style="margin:0">Editor SQL</h1>
            <span class="robot-status-label"
                  th:classappend="' state-' + ${robotState}"
                  th:text="${robotState == 'db-offline' ? 'Robot offline: DB KO' : (robotState == 'script-error' ? 'Robot in allarme: script KO' : 'Robot operativo: DB OK')}">
                Robot operativo: DB OK
            </span>
        </div>
    </div>
    <p style="margin:0.15rem 0 0;color:rgba(236,254,255,0.9)">Componi, esegui e salva query SELECT direttamente su Oracle.</p>
</header>

<main class="editor-layout">

    <!-- Messaggi (Thymeleaf, visibili dopo redirect) -->
    <div th:if="${successMessage != null}" class="msg-bar ok" th:text="${successMessage}"></div>
    <div th:if="${errorMessage != null}"  class="msg-bar ko" th:text="${errorMessage}"></div>

    <!-- ── Card principale editor ─────────────────────────────────────────── -->
    <section class="card">

        <!-- Header card -->
        <div class="page-header" style="margin-bottom:0.8rem">
            <h2>
                Script SQL
                <span class="script-badge" id="currentScriptBadge"
                      th:text="${selectedScript != null ? selectedScript : '(nuovo)'}"></span>
            </h2>
            <a href="/dashboard" class="nav-back">← Torna al Cruscotto</a>
        </div>

        <!-- Barra selezione script -->
        <div class="editor-topbar" style="margin-bottom:0.8rem">
            <label for="scriptSelect" style="font-size:0.82rem;font-weight:600;color:#556">Script:</label>
            <select id="scriptSelect">
                <option value="">(nessuno — nuovo script)</option>
                <option th:each="proc : ${allProcedures}"
                        th:value="${proc.name()}"
                        th:text="${proc.name()}"
                        th:selected="${proc.name() == selectedScript}"></option>
            </select>
            <button class="btn btn-sec" id="btnLoad" type="button">Carica ▼</button>
            <button class="btn btn-sec" id="btnReloadCatalog" type="button" title="Ricarica catalogo SQL da disco">⟳ Catalogo</button>
        </div>

        <!-- Messaggio AJAX (visibile solo dopo esecuzione) -->
        <div id="ajaxMsg" class="msg-bar" style="margin-bottom:0.6rem"></div>

        <!-- ── Editor con numeri di riga ───────────────────────────────────── -->
        <div class="sql-editor-wrap" id="editorWrap">
            <div class="line-numbers" id="lineNumbers">1</div>
            <textarea id="sqlEditor"
                      spellcheck="false"
                      autocorrect="off"
                      autocapitalize="off"
                      autocomplete="off"
                      placeholder="-- Scrivi qui la tua query SELECT / WITH ..."
                      th:text="${sqlContent}"></textarea>
            <div class="sql-suggest-box" id="sqlSuggestBox" hidden>
                <ul id="sqlSuggestList"></ul>
            </div>
        </div>

        <!-- ── Parametri e label ────────────────────────────────────────────── -->
        <div class="params-row" style="margin-top:0.75rem">
            <div class="field-group">
                <label for="queryLabel">Etichetta query</label>
                <input type="text" id="queryLabel" placeholder="es. Fatture 2024">
            </div>
            <div class="field-group">
                <label for="saveNameInput">Nome file</label>
                <input type="text" id="saveNameInput" placeholder="es. query_fatture">
            </div>
            <div class="field-group">
                <label for="queryParams">Parametri bind (nome=valore, uno per riga)</label>
                <textarea id="queryParams"
                          placeholder="anno=2024&#10;applicazione=ALER"></textarea>
            </div>
        </div>

        <!-- ── Barra azioni ─────────────────────────────────────────────────── -->
        <div class="action-bar" style="margin-top:0.8rem">
            <button class="btn btn-run" id="btnRun" type="button">
                <span class="spin-inline" id="runSpinner"></span>
                ▶ Esegui
            </button>
            <button class="btn btn-sec" id="btnFormatSql" type="button" title="Formatta il testo SQL/PL-SQL con indentazione e keyword uppercase">⟳ Formatta SQL/PL-SQL</button>
            <div class="spacer"></div>

            <!-- Salva come nuovo script -->
            <form id="formSave" method="post" action="/editor/save" style="display:inline;margin:0">
                <input type="hidden" id="saveSqlText" name="sqlText">
                <input type="hidden" id="saveQueryFileName" name="queryFileName">
                <input type="hidden" id="saveQueryLabel" name="queryLabel">
                <button class="btn btn-save" id="btnSave" type="button">💾 Salva nuovo</button>
            </form>

            <!-- Aggiorna script selezionato -->
            <form id="formUpdate" method="post" action="/editor/update" style="display:inline;margin:0">
                <input type="hidden" id="updateSqlText" name="sqlText">
                <input type="hidden" id="updateSelectedScript" name="selectedScript">
                <button class="btn btn-upd" id="btnUpdate" type="button"
                        th:disabled="${selectedScript == null}">✏ Aggiorna script</button>
            </form>
        </div>

    </section>

    <!-- ── Pannello risultati ───────────────────────────────────────────────── -->
    <section class="card" id="resultPanel">
        <div class="result-header">
            <h3>Risultati</h3>
            <span id="resultMsg" style="font-size:0.85rem;color:#556"></span>
            <span class="spacer" style="flex:1"></span>
            <button class="btn btn-sec" id="btnToggleDensity" type="button"
                    style="padding:0.25rem 0.7rem;font-size:0.8rem">Vista compatta</button>
            <button class="btn btn-sec" id="btnToggleColumnWrap" type="button"
                    style="padding:0.25rem 0.7rem;font-size:0.8rem">Colonne strette</button>
            <a id="resultOpenLink" href="#" target="_blank" rel="noopener"
               style="font-size:0.82rem;color:var(--accent);display:none">Apri in finestra ↗</a>
            <button class="btn btn-sec" id="btnCloseResult" type="button"
                    style="padding:0.25rem 0.7rem;font-size:0.8rem">✕ Chiudi</button>
        </div>
        <iframe id="resultFrame" title="Risultato query"></iframe>
    </section>

</main>

<script>
(function () {
    'use strict';

    // ── Riferimenti DOM ──────────────────────────────────────────────────────
    const sqlEditor       = document.getElementById('sqlEditor');
    const sqlSuggestBox   = document.getElementById('sqlSuggestBox');
    const sqlSuggestList  = document.getElementById('sqlSuggestList');
    const lineNumbers     = document.getElementById('lineNumbers');
    const scriptSelect    = document.getElementById('scriptSelect');
    const currentBadge    = document.getElementById('currentScriptBadge');
    const ajaxMsg         = document.getElementById('ajaxMsg');
    const btnRun          = document.getElementById('btnRun');
    const runSpinner      = document.getElementById('runSpinner');
    const btnLoad         = document.getElementById('btnLoad');
    const btnReloadCatalog= document.getElementById('btnReloadCatalog');
    const btnSave         = document.getElementById('btnSave');
    const btnUpdate       = document.getElementById('btnUpdate');
    const saveNameInput   = document.getElementById('saveNameInput');
    const queryParams     = document.getElementById('queryParams');
    const resultPanel     = document.getElementById('resultPanel');
    const resultFrame     = document.getElementById('resultFrame');
    const resultMsg       = document.getElementById('resultMsg');
    const resultOpenLink  = document.getElementById('resultOpenLink');
    const btnCloseResult  = document.getElementById('btnCloseResult');
    const btnToggleDensity = document.getElementById('btnToggleDensity');
    const btnToggleColumnWrap = document.getElementById('btnToggleColumnWrap');
    const RESULT_DENSITY_KEY = 'cruscotto.result.tableDensity';
    const RESULT_COLUMN_WRAP_KEY = 'cruscotto.result.columnWrap';
    let resultDensity = localStorage.getItem(RESULT_DENSITY_KEY) || 'comfortable';
    let resultColumnWrap = localStorage.getItem(RESULT_COLUMN_WRAP_KEY) === 'true';

    const SQL_KEYWORDS = [
        'SELECT', 'FROM', 'WHERE', 'GROUP', 'BY', 'ORDER', 'HAVING', 'DISTINCT',
        'WITH', 'AS', 'JOIN', 'INNER', 'LEFT', 'RIGHT', 'FULL', 'OUTER', 'ON',
        'UNION', 'UNION ALL', 'EXISTS', 'IN', 'NOT', 'AND', 'OR', 'NULL', 'IS',
        'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'LIKE', 'BETWEEN', 'FETCH', 'FIRST',
        'NEXT', 'ROWS', 'ONLY', 'OFFSET', 'ROWNUM', 'ROW_NUMBER', 'OVER', 'PARTITION',
        'CREATE', 'VIEW', 'ALTER', 'DROP', 'TABLE', 'INSERT', 'INTO', 'VALUES',
        'UPDATE', 'SET', 'DELETE', 'MERGE', 'USING', 'COMMIT', 'ROLLBACK'
    ];

    let suggestItems = [];
    let suggestIndex = -1;
    let suggestContext = null;

    // ── Numeri di riga ───────────────────────────────────────────────────────
    function updateLineNumbers() {
        const lines = sqlEditor.value.split('\n').length;
        let nums = '';
        for (let i = 1; i <= lines; i++) nums += i + '\n';
        lineNumbers.textContent = nums;
        lineNumbers.scrollTop = sqlEditor.scrollTop;
    }

    function syncBindParamsFromSql() {
        const matches = sqlEditor.value.match(/:[a-zA-Z_]\w*/g);
        const params = [];
        const seen = new Set();

        if (matches) {
            matches.forEach((match) => {
                const paramName = match.substring(1);
                if (!seen.has(paramName)) {
                    seen.add(paramName);
                    params.push(paramName + '=');
                }
            });
        }

        queryParams.value = params.join('\n');
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function hideSuggestions() {
        suggestItems = [];
        suggestIndex = -1;
        suggestContext = null;
        sqlSuggestList.innerHTML = '';
        sqlSuggestBox.hidden = true;
    }

    function getAutocompleteContext() {
        const caret = sqlEditor.selectionStart;
        if (caret !== sqlEditor.selectionEnd) {
            return null;
        }
        const text = sqlEditor.value;
        let start = caret;
        while (start > 0 && /[A-Za-z_]/.test(text.charAt(start - 1))) {
            start -= 1;
        }
        let end = caret;
        while (end < text.length && /[A-Za-z_]/.test(text.charAt(end))) {
            end += 1;
        }
        const prefix = text.substring(start, caret);
        if (!prefix || prefix.length < 1) {
            return null;
        }
        if (start > 0 && text.charAt(start - 1) === ':') {
            return null;
        }
        return {
            start,
            end,
            prefix
        };
    }

    function highlightPrefix(word, prefix) {
        const upperWord = word.toUpperCase();
        const upperPrefix = prefix.toUpperCase();
        if (!upperWord.startsWith(upperPrefix)) {
            return escapeHtml(word);
        }
        const left = escapeHtml(word.substring(0, prefix.length));
        const right = escapeHtml(word.substring(prefix.length));
        return '<strong>' + left + '</strong>' + right;
    }

    function renderSuggestions(items, prefix) {
        sqlSuggestList.innerHTML = items.map((item, idx) => {
            return '<li class="sql-suggest-item' + (idx === suggestIndex ? ' active' : '') + '" data-idx="' + idx + '">' +
                highlightPrefix(item, prefix) +
                '</li>';
        }).join('');
        sqlSuggestBox.hidden = false;
    }

    function refreshSuggestions() {
        const context = getAutocompleteContext();
        if (!context) {
            hideSuggestions();
            return;
        }

        const prefixUpper = context.prefix.toUpperCase();
        const matches = SQL_KEYWORDS
            .filter((kw) => kw.startsWith(prefixUpper) && kw !== prefixUpper)
            .slice(0, 8);

        if (!matches.length) {
            hideSuggestions();
            return;
        }

        suggestContext = context;
        suggestItems = matches;
        suggestIndex = 0;
        renderSuggestions(suggestItems, context.prefix);
    }

    function setActiveSuggestion(nextIndex) {
        if (!suggestItems.length) {
            return;
        }
        suggestIndex = (nextIndex + suggestItems.length) % suggestItems.length;
        Array.from(sqlSuggestList.children).forEach((li, idx) => {
            li.classList.toggle('active', idx === suggestIndex);
        });
    }

    function applySuggestion(index) {
        if (!suggestContext || !suggestItems.length) {
            return false;
        }
        const selected = suggestItems[index];
        if (!selected) {
            return false;
        }

        const text = sqlEditor.value;
        const before = text.substring(0, suggestContext.start);
        const after = text.substring(suggestContext.end);
        const needsSpace = after.length > 0 && !/^\s|[,);]/.test(after.charAt(0));
        const insert = selected + (needsSpace ? ' ' : ' ');

        sqlEditor.value = before + insert + after;
        const newCaret = before.length + insert.length;
        sqlEditor.selectionStart = newCaret;
        sqlEditor.selectionEnd = newCaret;
        updateLineNumbers();
        syncBindParamsFromSql();
        hideSuggestions();
        return true;
    }

    sqlSuggestList.addEventListener('mousedown', (e) => {
        const li = e.target.closest('.sql-suggest-item');
        if (!li) {
            return;
        }
        e.preventDefault();
        const idx = Number(li.getAttribute('data-idx'));
        applySuggestion(idx);
        sqlEditor.focus();
    });

    sqlEditor.addEventListener('input', () => {
        updateLineNumbers();
        syncBindParamsFromSql();
        refreshSuggestions();
    });
    sqlEditor.addEventListener('scroll', () => {
        lineNumbers.scrollTop = sqlEditor.scrollTop;
    });
    sqlEditor.addEventListener('click', refreshSuggestions);
    sqlEditor.addEventListener('blur', () => {
        setTimeout(() => {
            if (document.activeElement !== sqlEditor) {
                hideSuggestions();
            }
        }, 120);
    });
    sqlEditor.addEventListener('keydown', (e) => {
        if (!sqlSuggestBox.hidden && suggestItems.length) {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setActiveSuggestion(suggestIndex + 1);
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                setActiveSuggestion(suggestIndex - 1);
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                applySuggestion(suggestIndex);
                return;
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                hideSuggestions();
                return;
            }
        }

        // Tab accetta suggerimento attivo, altrimenti inserisce 4 spazi
        if (e.key === 'Tab') {
            if (!sqlSuggestBox.hidden && suggestItems.length) {
                e.preventDefault();
                applySuggestion(suggestIndex >= 0 ? suggestIndex : 0);
                return;
            }
            e.preventDefault();
            const start = sqlEditor.selectionStart;
            const end   = sqlEditor.selectionEnd;
            sqlEditor.value = sqlEditor.value.substring(0, start) + '    ' + sqlEditor.value.substring(end);
            sqlEditor.selectionStart = sqlEditor.selectionEnd = start + 4;
            updateLineNumbers();
            syncBindParamsFromSql();
            refreshSuggestions();
        }
    });
    updateLineNumbers();
    syncBindParamsFromSql();

    // Sincronizza altezza wrapper con textarea manuale resize
    new ResizeObserver(() => {
        lineNumbers.scrollTop = sqlEditor.scrollTop;
    }).observe(sqlEditor);

    // ── Carica script selezionato ────────────────────────────────────────────
    btnLoad.addEventListener('click', () => {
        const name = scriptSelect.value;
        if (!name) {
            sqlEditor.value = '';
            currentBadge.textContent = '(nuovo)';
            saveNameInput.value = '';
            btnUpdate.disabled = true;
            document.getElementById('updateSelectedScript').value = '';
            updateLineNumbers();
            syncBindParamsFromSql();
            hideMsg();
            return;
        }
        fetch('/editor/load-script?script=' + encodeURIComponent(name))
            .then(r => r.ok ? r.json() : Promise.reject('Errore HTTP ' + r.status))
            .then(data => {
                sqlEditor.value = data.sqlText || '';
                currentBadge.textContent = name;
                saveNameInput.value = name;
                updateLineNumbers();
                syncBindParamsFromSql();
                hideMsg();
                // Aggiorna pulsante Update
                btnUpdate.disabled = false;
                document.getElementById('updateSelectedScript').value = name;
            })
            .catch(err => showMsg('Errore caricamento script: ' + err, false));
    });

    // ── Ricarica catalogo ────────────────────────────────────────────────────
    btnReloadCatalog.addEventListener('click', () => {
        const fd = new FormData();
        fetch('/catalog/reload', { method: 'POST', body: fd })
            .then(() => location.reload())
            .catch(() => location.reload());
    });

    // ── Formattatore PL/SQL ──────────────────────────────────────────────────
    function formatPlSql(rawSql) {
        if (!rawSql || !rawSql.trim()) return rawSql;

        // Protect string literals and comments from modification
        const saved = [];
        let cnt = 0;
        function protect(m) {
            const k = '\x00' + (cnt++) + '\x00';
            saved.push(m);
            return k;
        }

        let s = rawSql
            .replace(/\/\*[\s\S]*?\*\//g, protect)
            .replace(/--[^\n]*/g, protect)
            .replace(/'(?:[^']|'')*'/g, protect);

        // Normalize whitespace
        s = s.replace(/\r?\n/g, ' ').replace(/\t/g, ' ').replace(/ +/g, ' ').trim();

        // Uppercase keywords (longer phrases first)
        const KEYWORDS = [
            'SELECT DISTINCT','SELECT ALL','SELECT',
            'GROUP BY','ORDER BY','PARTITION BY','CONNECT BY','START WITH',
            'UNION ALL','UNION','INTERSECT','MINUS','EXCEPT',
            'INNER JOIN','LEFT OUTER JOIN','RIGHT OUTER JOIN','FULL OUTER JOIN',
            'LEFT JOIN','RIGHT JOIN','FULL JOIN','CROSS JOIN','NATURAL JOIN',
            'INSERT INTO','DELETE FROM','MERGE INTO',
            'CREATE OR REPLACE PROCEDURE','CREATE OR REPLACE FUNCTION',
            'CREATE OR REPLACE PACKAGE BODY','CREATE OR REPLACE PACKAGE',
            'CREATE OR REPLACE TRIGGER','CREATE OR REPLACE VIEW',
            'CREATE TABLE','CREATE INDEX','CREATE VIEW','CREATE',
            'ALTER TABLE','ALTER','DROP TABLE','DROP',
            'IS NOT NULL','IS NULL','NOT IN','NOT EXISTS','NOT LIKE','NOT BETWEEN',
            'END IF','END LOOP','END CASE',
            'ROWS BETWEEN','RANGE BETWEEN','FETCH FIRST','FETCH NEXT','ROWS ONLY',
            'FROM','WHERE','HAVING','SET','INTO','VALUES',
            'ON','AS','IS','IN','EXISTS','LIKE','BETWEEN',
            'AND','OR','NOT',
            'NULL','TRUE','FALSE',
            'DECLARE','BEGIN','END','EXCEPTION','RETURN','RAISE',
            'IF','ELSIF','ELSEIF','ELSE','THEN',
            'CASE','WHEN',
            'FOR','WHILE','LOOP','EXIT WHEN','EXIT',
            'CURSOR','OPEN','FETCH','CLOSE',
            'PROCEDURE','FUNCTION','PACKAGE BODY','PACKAGE','TRIGGER',
            'UPDATE','DELETE','INSERT',
            'COMMIT','ROLLBACK','SAVEPOINT',
            'WITH','OVER','DISTINCT','ALL',
            'PRIOR','LEVEL','ROWNUM','ROWID'
        ];

        KEYWORDS.forEach(k => {
            s = s.replace(
                new RegExp('\\b' + k.replace(/ /g, '\\s+') + '\\b', 'gi'),
                k
            );
        });

        // Add newline before structural keywords
        const NEWLINE_BEFORE = [
            'SELECT DISTINCT','SELECT ALL','SELECT',
            'GROUP BY','ORDER BY',
            'UNION ALL','UNION','INTERSECT','MINUS','EXCEPT',
            'INNER JOIN','LEFT OUTER JOIN','RIGHT OUTER JOIN','FULL OUTER JOIN',
            'LEFT JOIN','RIGHT JOIN','FULL JOIN','CROSS JOIN','NATURAL JOIN',
            'FROM','WHERE','HAVING','SET','VALUES',
            'DECLARE','BEGIN','EXCEPTION',
            'END IF','END LOOP','END CASE','END',
            'ELSIF','ELSE',
            'COMMIT','ROLLBACK',
            'WITH'
        ];

        NEWLINE_BEFORE.forEach(k => {
            s = s.replace(
                new RegExp(' (' + k.replace(/ /g, '\\s+') + ')(?=[ (\\n]|$)', 'g'),
                '\n$1'
            );
        });

        // AND/OR on new indented lines
        s = s.replace(/ (AND|OR) /g, '\n    $1 ');

        // Newline after semicolon
        s = s.replace(/;(?!\x00)/g, ';\n');

        // Indentation pass
        const lines = s.split('\n');
        let depth = 0;
        const IND = '    ';
        const result = [];
        const DEC_BEFORE = /^(END\b|ELSIF\b|ELSE\b|EXCEPTION\b)/i;
        const INC_AFTER  = /^(BEGIN\b|DECLARE\b|THEN\b|ELSE\b|LOOP\b)/i;

        lines.forEach(line => {
            const t = line.trim();
            if (!t) return;
            if (DEC_BEFORE.test(t)) depth = Math.max(0, depth - 1);
            result.push(IND.repeat(depth) + t);
            if (INC_AFTER.test(t)) depth++;
        });

        s = result.join('\n');

        // Restore protected fragments
        s = s.replace(/\x00(\d+)\x00/g, (_, i) => saved[parseInt(i, 10)]);

        return s;
    }

    const btnFormatSql = document.getElementById('btnFormatSql');
    if (btnFormatSql) {
        btnFormatSql.addEventListener('click', () => {
            const formatted = formatPlSql(sqlEditor.value);
            if (formatted !== null && formatted !== undefined) {
                sqlEditor.value = formatted;
                updateLineNumbers();
                sqlEditor.focus();
            }
        });
    }

    // ── Esegui query (AJAX) ──────────────────────────────────────────────────
    btnRun.addEventListener('click', async () => {
        const sql = sqlEditor.value.trim();
        if (!sql) { showMsg('Inserisci una query SQL.', false); return; }

        // Verifica che la query sia eseguibile
        const allowedKeywords = ['SELECT', 'WITH', 'INSERT', 'UPDATE'];
        const isExecutable = allowedKeywords.some(keyword => sql.toUpperCase().startsWith(keyword));
        if (!isExecutable) {
            showMsg('Solo query SELECT, WITH, INSERT e UPDATE possono essere eseguite.', false);
            return;
        }

        setRunning(true);
        hideMsg();
        resultPanel.style.display = 'none';

        const fd = new FormData();
        fd.append('sqlText',    sql);
        fd.append('queryLabel', document.getElementById('queryLabel').value);
        fd.append('queryParams', document.getElementById('queryParams').value);

        try {
            const resp = await fetch('/editor/execute', { method: 'POST', body: fd });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();

            if (data.ok) {
                showMsg(data.message, true);
                if (data.outputUrl) {
                    resultFrame.src = data.outputUrl;
                    resultMsg.textContent = data.message;
                    resultOpenLink.href = data.outputUrl;
                    resultOpenLink.style.display = '';
                    resultPanel.style.display = 'block';
                    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } else {
                showMsg(data.message, false);
            }
        } catch (err) {
            showMsg('Errore di comunicazione: ' + err.message, false);
        } finally {
            setRunning(false);
        }
    });

    // ── Salva nuovo script ───────────────────────────────────────────────────
    btnSave.addEventListener('click', () => {
        const sql = sqlEditor.value.trim();
        if (!sql) { showMsg('Inserisci una query SQL da salvare.', false); return; }
        const fileName = saveNameInput.value.trim();
        if (!fileName) { showMsg('Specifica un nome file prima di salvare.', false); saveNameInput.focus(); return; }

        document.getElementById('saveSqlText').value = sql;
        document.getElementById('saveQueryFileName').value = fileName;
        document.getElementById('saveQueryLabel').value = document.getElementById('queryLabel').value;
        document.getElementById('formSave').submit();
    });

    // ── Aggiorna script esistente ────────────────────────────────────────────
    btnUpdate.addEventListener('click', () => {
        const sql = sqlEditor.value.trim();
        if (!sql) { showMsg('Il testo SQL è vuoto.', false); return; }
        const name = scriptSelect.value;
        if (!name) { showMsg("Seleziona prima uno script dall'elenco.", false); return; }
        if (!confirm('Sovrascrivere lo script "' + name + '" con il contenuto corrente?')) return;

        document.getElementById('updateSqlText').value = sql;
        document.getElementById('updateSelectedScript').value = name;
        document.getElementById('formUpdate').submit();
    });

    // ── Chiudi risultati ─────────────────────────────────────────────────────
    btnCloseResult.addEventListener('click', () => {
        resultPanel.style.display = 'none';
        resultFrame.src = 'about:blank';
    });

    resultFrame.addEventListener('load', () => {
        applyResultTableTheme();
        applyResultDensity();
        applyResultColumnWrap();
    });

    if (btnToggleDensity) {
        btnToggleDensity.addEventListener('click', () => {
            resultDensity = resultDensity === 'compact' ? 'comfortable' : 'compact';
            localStorage.setItem(RESULT_DENSITY_KEY, resultDensity);
            updateDensityButtonLabel();
            applyResultDensity();
        });
    }

    if (btnToggleColumnWrap) {
        btnToggleColumnWrap.addEventListener('click', () => {
            resultColumnWrap = !resultColumnWrap;
            localStorage.setItem(RESULT_COLUMN_WRAP_KEY, resultColumnWrap);
            updateColumnWrapButtonLabel();
            applyResultColumnWrap();
        });
    }

    // ── Utilità ──────────────────────────────────────────────────────────────
    function updateDensityButtonLabel() {
        if (!btnToggleDensity) {
            return;
        }
        btnToggleDensity.textContent = resultDensity === 'compact' ? 'Vista estesa' : 'Vista compatta';
    }

    function updateColumnWrapButtonLabel() {
        if (!btnToggleColumnWrap) {
            return;
        }
        btnToggleColumnWrap.textContent = resultColumnWrap ? 'Colonne strette' : 'Adatta colonne';
    }

    function applyResultDensity() {
        try {
            const frameDoc = resultFrame.contentDocument;
            if (!frameDoc || !frameDoc.body) {
                return;
            }
            frameDoc.body.setAttribute('data-density', resultDensity);
        } catch (e) {
            // Se il contenuto non e accessibile, resta lo stile originale.
        }
    }

    function applyResultColumnWrap() {
        try {
            const frameDoc = resultFrame.contentDocument;
            if (!frameDoc || !frameDoc.body) {
                return;
            }
            frameDoc.body.setAttribute('data-column-wrap', resultColumnWrap ? 'true' : 'false');
        } catch (e) {
            // Se il contenuto non e accessibile, resta lo stile originale.
        }
    }

    function applyResultTableTheme() {
        try {
            const frameDoc = resultFrame.contentDocument;
            if (!frameDoc || !frameDoc.head) {
                return;
            }

            if (frameDoc.getElementById('editor-result-table-theme')) {
                return;
            }

            const style = frameDoc.createElement('style');
            style.id = 'editor-result-table-theme';
            style.textContent = `
                body {
                    margin: 0;
                    padding: 14px;
                    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
                    background: linear-gradient(180deg, #f8fbfd 0%, #ffffff 100%);
                    color: #17353c;
                }

                .table-wrap {
                    border: 1px solid #d2e2e8;
                    border-radius: 10px;
                    overflow: auto;
                    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
                    background: #fff;
                }

                table {
                    width: 100%;
                    border-collapse: collapse;
                    min-width: 780px;
                }

                thead th {
                    position: sticky;
                    top: 0;
                    z-index: 2;
                    background: linear-gradient(180deg, #e7f3f8 0%, #d7ebf3 100%);
                    color: #16363d;
                    text-transform: uppercase;
                    letter-spacing: 0.03em;
                    font-size: 0.74rem;
                    font-weight: 700;
                    border-bottom: 1px solid #b9d5df;
                }

                th, td {
                    padding: 9px 10px;
                    border-bottom: 1px solid #e5eef2;
                    text-align: left;
                    vertical-align: top;
                    font-size: 0.84rem;
                    white-space: nowrap;
                }

                body[data-density="compact"] th,
                body[data-density="compact"] td {
                    padding: 5px 7px;
                    font-size: 0.76rem;
                }

                body[data-density="compact"] thead th {
                    font-size: 0.68rem;
                }

                body[data-density="compact"] table {
                    min-width: 640px;
                }

                body[data-column-wrap="true"] th,
                body[data-column-wrap="true"] td {
                    white-space: normal;
                    max-width: 200px;
                    word-break: break-word;
                }

                tbody tr:nth-child(even) {
                    background: #f8fbfe;
                }

                tbody tr:hover {
                    background: #eef7fb;
                }

                caption {
                    caption-side: top;
                    text-align: left;
                    padding: 0 0 10px;
                    font-weight: 600;
                    color: #30545c;
                }
            `;
            frameDoc.head.appendChild(style);

            frameDoc.querySelectorAll('table').forEach((table) => {
                if (!table.parentElement || !table.parentElement.classList.contains('table-wrap')) {
                    const wrap = frameDoc.createElement('div');
                    wrap.className = 'table-wrap';
                    table.parentNode.insertBefore(wrap, table);
                    wrap.appendChild(table);
                }
            });
        } catch (e) {
            // Se il contenuto non e accessibile, resta lo stile originale.
        }
    }

    function showMsg(text, ok) {
        ajaxMsg.textContent = text;
        ajaxMsg.className = 'msg-bar ' + (ok ? 'ok' : 'ko');
    }

    function hideMsg() {
        ajaxMsg.className = 'msg-bar';
        ajaxMsg.textContent = '';
    }

    function setRunning(busy) {
        btnRun.disabled = busy;
        runSpinner.style.display = busy ? 'inline-block' : 'none';
        document.body.classList.toggle('is-busy', busy);
    }

    updateDensityButtonLabel();
    updateColumnWrapButtonLabel();

    // Sincronizza scriptSelect con il valore preselezionato da Thymeleaf
    const preselected = currentBadge.textContent.trim();
    if (preselected && preselected !== '(nuovo)') {
        scriptSelect.value = preselected;
        btnUpdate.disabled = false;
        document.getElementById('updateSelectedScript').value = preselected;
        saveNameInput.value = preselected;
    } else {
        scriptSelect.value = '';
        btnUpdate.disabled = true;
        document.getElementById('updateSelectedScript').value = '';
    }

})();

// Dialog per scelta apertura/download XLSX
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.xlsx-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var downloadUrl = this.getAttribute('data-xlsx-file');
            var viewUrl = this.getAttribute('data-xlsx-view');
            
            var choices = confirm('Scegli come visualizzare il file XLSX:\\n\\nOK = Apri nel browser\\nAnnulla = Scarica il file');
            if (choices) {
                window.open(viewUrl, '_blank');
            } else {
                window.location.href = downloadUrl;
            }
        });
    });
});
</script>
</body>
</html>
