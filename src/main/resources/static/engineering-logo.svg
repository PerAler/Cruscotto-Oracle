<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 145 36" height="30">
  <defs>
    <!-- Arch clip-paths for the two wing shapes -->
    <clipPath id="la">
      <path d="M2,35 L2,16 Q2,2 11,2 Q20,2 20,16 L20,35 Z"/>
    </clipPath>
    <clipPath id="ra">
      <path d="M22,35 L22,16 Q22,2 31,2 Q40,2 40,16 L40,35 Z"/>
    </clipPath>
  </defs>
  <!-- Left arch: solid top cap + 3 horizontal bars (gaps are transparent) -->
  <g clip-path="url(#la)" fill="white">
    <rect x="2"  y="2"  width="18" height="14"/>
    <rect x="2"  y="18" width="18" height="5"/>
    <rect x="2"  y="25" width="18" height="5"/>
    <rect x="2"  y="32" width="18" height="3"/>
  </g>
  <!-- Right arch: same structure, mirrored -->
  <g clip-path="url(#ra)" fill="white">
    <rect x="22" y="2"  width="18" height="14"/>
    <rect x="22" y="18" width="18" height="5"/>
    <rect x="22" y="25" width="18" height="5"/>
    <rect x="22" y="32" width="18" height="3"/>
  </g>
  <!-- Text "engage" -->
  <text x="48" y="25" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="300" fill="white" letter-spacing="0.5">engage</text>
</svg>
