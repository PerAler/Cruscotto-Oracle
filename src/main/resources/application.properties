spring.application.name=cruscotto-oracle
server.port=8090

# Configurazione Oracle JDBC via ambiente
spring.datasource.url=${ORACLE_JDBC_URL:jdbc:oracle:thin:@//HOST:1521/SERVICE_NAME}
spring.datasource.username=${ORACLE_JDBC_USERNAME:utente}
spring.datasource.password=${ORACLE_JDBC_PASSWORD:password}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Pool connessioni
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# Dashboard settings
app.logs.max-size=100
app.logs.persist.enabled=true
app.target-applications=ALER
app.default-application=ALER
app.sql.folder=sql
app.output.folder=output
app.output.max-items=100

# Disabilita cache template in sviluppo
spring.thymeleaf.cache=false

# Upload XLSX
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
