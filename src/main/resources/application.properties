spring.application.name=cruscotto-oracle
server.port=8090

# Configurazione Oracle JDBC via ambiente
spring.datasource.url=jdbc:h2:mem:cruscotto;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Pool connessioni
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000

# Dashboard settings
app.logs.max-size=100
app.logs.persist.enabled=false
app.target-applications=ALER
app.default-application=ALER
app.sql.root-dir=sql
app.output.folder=output
app.output.max-items=100

# Disabilita cache template in sviluppo
spring.thymeleaf.cache=false

# Upload XLSX
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
